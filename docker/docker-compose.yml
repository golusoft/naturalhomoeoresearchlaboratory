version: "3.8"

services:
  # Next.js Application
  nextjs:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nhrl_nextjs
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - WORDPRESS_API_URL=${WORDPRESS_API_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    networks:
      - nhrl_network
    restart: unless-stopped
    depends_on:
      - wordpress
      - mysql

  # WordPress CMS
  wordpress:
    image: wordpress:6.4-php8.2-apache
    container_name: nhrl_wordpress
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_TABLE_PREFIX: nhrl_
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress-config.php:/var/www/html/wp-config-extra.php
    networks:
      - nhrl_network
    restart: unless-stopped
    depends_on:
      - mysql

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: nhrl_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nhrl_network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: nhrl_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - nhrl_network
    restart: unless-stopped
    depends_on:
      - nextjs
      - wordpress

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nhrl_redis
    ports:
      - "6379:6379"
    networks:
      - nhrl_network
    restart: unless-stopped

networks:
  nhrl_network:
    driver: bridge

volumes:
  wordpress_data:
  mysql_data:
  nginx_logs:
